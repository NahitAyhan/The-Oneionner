<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="container">
  <h2>Login</h2>

  <form id="loginForm">
    <input type="text" id="loginTcNo" placeholder="TC Identity Number (11 Digits)">
    <input type="password" id="loginPassword" placeholder="Password">
    
    <p id="loginError" style="color: red; font-size: 14px; margin-bottom: 15px; display: none;"></p>

    <button type="submit">Login</button>
  </form>

  <p>Don't have an account? <a href="register.html">Register</a></p>
</div>

<script src="js/validation.js"></script>
</body>
</html>
